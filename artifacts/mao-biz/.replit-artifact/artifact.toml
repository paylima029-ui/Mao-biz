kind = "web"
  previewPath = "/"
  title = "MAO-BIZ"
  version = "1.0.0"
  id = "artifacts/mao-biz"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 24648

  [services.development]
  run = "pnpm --filter @workspace/mao-biz run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/mao-biz", "run", "build" ]
  publicDir = "artifacts/mao-biz/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "24648"
  BASE_PATH = "/"
  